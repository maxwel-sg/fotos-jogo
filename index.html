<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAIN Fotografia Esportiva</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>📸 DAIN Fotografia Esportiva</h1>

    <p>
        Escolha sua foto favorita.<br>
        Cada foto custa <strong>R$ 5,00</strong>
    </p>

</header>

<div id="gallery" class="gallery"></div>

<!-- Modal -->

<div id="modal" class="modal">

    <span class="fechar">&times;</span>

    <div class="modal-container">

        <img id="imgModal">

        <div class="modal-watermark">
            DAIN FOTOGRAFIA
        </div>

        <div class="modal-info">

            <h2 id="modalNome"></h2>

            <div class="modalPreco">
                R$ 5,00
            </div>

            <a
                id="modalComprar"
                class="btn"
                target="_blank">
                Comprar
            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
